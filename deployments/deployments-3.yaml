apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubernetes.io/change-cause: "cambio imagen fake"
  name: deployment-test
  labels:
    app: front
spec:
  replicas: 3
  selector: 
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front #debe coincidir con las labels del deployment
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
          - containerPort: 100