apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-2-deployment
  labels:
    app: service-2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: service-2
  template:
    metadata:
      labels:
        app: service-2
    spec:
      containers:
      - name: service-2-container
        image: nginx:latest
        ports:
        - containerPort: 80
      
---
apiVersion: v1
kind: Service
metadata:
  name: service-2-service
  labels:
    app: service-2
spec:
  type: ClusterIP
  selector:
    app: service-2
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 80