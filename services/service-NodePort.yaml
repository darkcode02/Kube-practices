apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-3-deployment
  labels:
    app: service-3
spec:
  replicas: 3
  selector:
    matchLabels:
      app: service-3
  template:
    metadata:
      labels:
        app: service-3
    spec:
      containers:
      - name: service-3-container
        image: nginx:alpine
        ports:
        - containerPort: 80
      
---
apiVersion: v1
kind: Service
metadata:
  name: service-3-service
  labels:
    app: service-3
spec:
  type: NodePort
  selector:
    app: service-3
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 80