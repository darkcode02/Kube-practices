apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-1-deployment
  labels:
    app: service-1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: service-1
  template:
    metadata:
      labels:
        app: service-1
    spec:
      containers:
      - name: service-1-container
        image: nginx:latest
---
apiVersion: v1
kind: Service
metadata:
  name: service-1-service
  labels:
    app: service-1
spec:
  selector:
    app: service-1
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 80